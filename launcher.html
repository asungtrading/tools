<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Asung Tools">
<meta name="theme-color" content="#080a0f">
<title>Asung Tools</title>
<style>
* { -webkit-box-sizing: border-box; box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; background: #080a0f; color: #f1f5f9; }
body {
  font-family: -apple-system, 'Helvetica Neue', Arial, sans-serif;
  min-height: 100%; display: flex; flex-direction: column;
  align-items: center; justify-content: center; padding: 40px 24px;
}
.logo-wrap { text-align: center; margin-bottom: 40px; }
.logo { font-size: 34px; font-weight: 900; letter-spacing: -1px; color: #3b82f6; }
.logo-sub { font-size: 11px; letter-spacing: 4px; text-transform: uppercase; color: #475569; margin-top: 6px; }
.menu { width: 100%; max-width: 360px; }
.menu-item {
  display: flex; align-items: center;
  background: #0f1218; border: 1px solid #222a38; border-radius: 12px;
  padding: 16px 18px; text-decoration: none; color: #f1f5f9; margin-bottom: 10px; cursor: pointer;
}
.menu-item:active { background: #161b24; border-color: #2a3446; }
.icon {
  width: 40px; height: 40px; border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 20px; margin-right: 14px; flex-shrink: 0;
}
.icon-red    { background: #2a1010; }
.icon-orange { background: #2a1a00; }
.icon-blue   { background: #0f1e38; }
.icon-green  { background: #0a2010; }
.icon-purple { background: #1a0f2a; }
.item-text { flex: 1; }
.item-name { font-size: 14px; font-weight: 600; line-height: 1.3; }
.item-desc { font-size: 11px; color: #475569; margin-top: 3px; }
.arrow { color: #2a3446; font-size: 20px; margin-left: 8px; }
.footer { margin-top: 32px; font-size: 11px; color: #2a3446; letter-spacing: 1px; text-align: center; }
</style>
</head>
<body>

<div class="logo-wrap">
  <div class="logo">ASUNG</div>
  <div class="logo-sub">Tools</div>
</div>

<div class="menu">

  <a class="menu-item" href="https://asungtrading.github.io/tools/">
    <div class="icon icon-red">🚨</div>
    <div class="item-text">
      <div class="item-name">긴급 발주 대시보드</div>
      <div class="item-desc">재고 긴급 발주 현황</div>
    </div>
    <div class="arrow">&#8250;</div>
  </a>

  <a class="menu-item" href="https://asungtrading.github.io/tools/purchasing.html">
    <div class="icon icon-orange">📦</div>
    <div class="item-text">
      <div class="item-name">발주 관리</div>
      <div class="item-desc">Supplier별 추천발주 및 Forecast</div>
    </div>
    <div class="arrow">&#8250;</div>
  </a>

  <a class="menu-item" href="https://asungtrading.github.io/tools/OpenOrders.html">
    <div class="icon icon-blue">📋</div>
    <div class="item-text">
      <div class="item-name">데일리 오픈 오더</div>
      <div class="item-desc">오늘의 미처리 오더</div>
    </div>
    <div class="arrow">&#8250;</div>
  </a>

  <a class="menu-item" href="https://asungtrading.github.io/tools/SalesOverview.html">
    <div class="icon icon-green">📈</div>
    <div class="item-text">
      <div class="item-name">최근 판매 현황</div>
      <div class="item-desc">최근 판매 데이터 요약</div>
    </div>
    <div class="arrow">&#8250;</div>
  </a>

  <a class="menu-item" href="https://asungtrading.github.io/tools/analytics.html">
    <div class="icon icon-purple">🔍</div>
    <div class="item-text">
      <div class="item-name">Historical Data</div>
      <div class="item-desc">2022년부터 전체 매출 분석</div>
    </div>
    <div class="arrow">&#8250;</div>
  </a>

</div>

<div class="footer">ASUNG TRADING INC.</div>

</body>
</html>
