<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Asung Tools">
<meta name="theme-color" content="#080a0f">
<title>Asung Tools</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

body {
  background: #080a0f;
  color: #f1f5f9;
  font-family: -apple-system, 'Segoe UI', sans-serif;
  min-height: 100vh;
  min-height: 100dvh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: env(safe-area-inset-top, 24px) 24px env(safe-area-inset-bottom, 24px);
}

.logo-wrap {
  text-align: center;
  margin-bottom: 48px;
}

.logo {
  font-size: 36px;
  font-weight: 900;
  letter-spacing: -1px;
  background: linear-gradient(135deg, #3b82f6, #14b8a6);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.logo-sub {
  font-size: 11px;
  letter-spacing: 4px;
  text-transform: uppercase;
  color: #475569;
  margin-top: 6px;
}

.menu {
  width: 100%;
  max-width: 360px;
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.menu-item {
  display: flex;
  align-items: center;
  gap: 16px;
  background: #0f1218;
  border: 1px solid #222a38;
  border-radius: 14px;
  padding: 18px 20px;
  text-decoration: none;
  color: #f1f5f9;
  transition: background 0.15s, border-color 0.15s, transform 0.1s;
  cursor: pointer;
  -webkit-user-select: none;
}

.menu-item:active {
  background: #161b24;
  border-color: #2a3446;
  transform: scale(0.98);
}

.icon {
  width: 42px;
  height: 42px;
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
  flex-shrink: 0;
}

.icon.red    { background: rgba(239,68,68,.15); }
.icon.blue   { background: rgba(59,130,246,.15); }
.icon.green  { background: rgba(34,197,94,.15); }
.icon.purple { background: rgba(168,85,247,.15); }

.item-text { flex: 1; }
.item-name {
  font-size: 15px;
  font-weight: 600;
  line-height: 1.2;
}
.item-desc {
  font-size: 11px;
  color: #475569;
  margin-top: 3px;
}
.arrow {
  color: #2a3446;
  font-size: 18px;
  flex-shrink: 0;
}

.footer {
  margin-top: 40px;
  font-size: 11px;
  color: #2a3446;
  letter-spacing: 1px;
}
</style>
</head>
<body>

<div class="logo-wrap">
  <div class="logo">ASUNG</div>
  <div class="logo-sub">Tools</div>
</div>

<div class="menu">

  <a class="menu-item" href="https://asungtrading.github.io/tools/" target="_self">
    <div class="icon red">🚨</div>
    <div class="item-text">
      <div class="item-name">긴급 발주 대시보드</div>
      <div class="item-desc">재고 긴급 발주 현황</div>
    </div>
    <div class="arrow">›</div>
  </a>

  <a class="menu-item" href="https://asungtrading.github.io/tools/OpenOrders.html" target="_self">
    <div class="icon blue">📋</div>
    <div class="item-text">
      <div class="item-name">데일리 오픈 오더</div>
      <div class="item-desc">오늘의 미처리 오더</div>
    </div>
    <div class="arrow">›</div>
  </a>

  <a class="menu-item" href="https://asungtrading.github.io/tools/SalesOverview.html" target="_self">
    <div class="icon green">📈</div>
    <div class="item-text">
      <div class="item-name">최근 판매 현황</div>
      <div class="item-desc">최근 판매 데이터 요약</div>
    </div>
    <div class="arrow">›</div>
  </a>

  <a class="menu-item" href="https://asungtrading.github.io/tools/analytics.html" target="_self">
    <div class="icon purple">🔍</div>
    <div class="item-text">
      <div class="item-name">Historical Data</div>
      <div class="item-desc">2022년부터 전체 매출 분석</div>
    </div>
    <div class="arrow">›</div>
  </a>

</div>

<div class="footer">ASUNG TRADING INC.</div>

</body>
</html>
